# docker-compose.yml
# Stack de producción para SDIH Talleres en VPS AlmaLinux.
#
# El VPS ya corre Caddy en el host (no en Docker) manejando 80/443 para
# varios subdominios (engram.*, markitdown.*, talleres.*). Este compose
# levanta SOLO la app de Next.js escuchando en 127.0.0.1:3001 — el Caddy
# del host hace reverse_proxy a este puerto siguiendo el mismo patrón que
# engram-cloud:18080 y markitdown-hub:8001.
#
# Las variables del .env.production se consumen de DOS formas:
#  - Durante BUILD: Next.js lee .env.production de la raíz del proyecto
#    y hornea las NEXT_PUBLIC_* en el bundle del cliente.
#  - En RUNTIME: env_file inyecta las server-side vars (SERVICE_ROLE_KEY,
#    RESEND_API_KEY, etc) al proceso del container.
#
# Uso:
#   1) Cargar variables en .env.production (ver docs/deploy.md)
#   2) Agregar el bloque de talleres al /etc/caddy/Caddyfile (ver docs/deploy.md)
#   3) docker compose up -d --build
#   4) systemctl reload caddy

services:
  app:
    image: sdih-talleres:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdih-app
    restart: unless-stopped
    env_file: .env.production
    ports:
      # Solo accesible desde el loopback del host. El Caddy del host
      # le hace reverse_proxy. NO exponer al exterior — toda terminación
      # TLS vive en el Caddy del host.
      - "127.0.0.1:3001:3000"
